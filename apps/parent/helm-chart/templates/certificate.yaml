apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gateway.tls.secretName }}
  namespace: kgateway-system
spec:
  secretName: {{ .Values.gateway.tls.secretName }}

  dnsNames:
    {{- range .Values.gateway.hosts }}
    - {{ . }}
    {{- end }}

  issuerRef:
    name: {{ .Values.gateway.tls.clusterIssuer }}
    kind: ClusterIssuer