image:
  repository: earlyaccesscare/eas_v3parent_web
  tag: latest
  pullPolicy: Always

gateway:
  name: eac-gateway-prod
  sectionName: training-parent
  enabled: true
  className: kgateway
  hosts:
    - training.parent.v3.earlyaccesscare.com
  tls:
    secretName: parent-training-tls
    clusterIssuer: letsencrypt-prod
  # Training is a public environment
  internal: false

envFrom:
  - secretRef:
      name: app-env-secret

persistentVolume:
  web:
    enabled: true
    storageClassName: azurefile-csi

service:
  web:
    type: ClusterIP
    port: 80
    
akv:
  secretProviderClass: akv-parent-training   # override per env
