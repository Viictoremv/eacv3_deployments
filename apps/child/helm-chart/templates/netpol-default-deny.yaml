{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "eas-app-v3-child.fullname" . }}-default-deny
spec:
  podSelector:
    matchLabels:
      app: {{ include "eas-app-v3-child.name" . }}-web
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:  []
{{- end }}
