image:
  repository: earlyaccesscare/easv3_child_web
  tag: dev-main-1792
  pullPolicy: Always

# This environment name is used with .Values.publicEnvironments
# to determine if the Gateway should be internal or public.
environment: dev

gateway:
  name: eac-gateway-nonprod
  sectionName: dev-child
  enabled: true
  className: kgateway
  hosts:
    - dev.v3.earlyaccesscare.com
  tls:
    secretName: child-dev-tls
    clusterIssuer: letsencrypt-nonprod
  # This flag is informational now; ILB behavior is driven by environment/publicEnvironments.
  internal: true

envFrom:
  - secretRef:
      name: app-env-secret

env:
  - name: REDIS_CLUSTER_ENABLED
    value: "true"
  - name: REDIS_TLS_ENABLED
    value: "true"
  - name: REDIS_TLS_VERIFY_PEER
    value: "false"
  - name: REDIS_TLS_VERIFY_PEER_NAME
    value: "false"
  - name: OTEL_SDK_DISABLED
    value: "false"
  - name: OTEL_TRACES_EXPORTER
    value: "otlp"
  - name: OTEL_EXPORTER_OTLP_PROTOCOL
    value: "http/protobuf"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://child-dev-easv3-child-otel-collector:4318"
  - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
    value: "http://child-dev-easv3-child-otel-collector:4318/v1/traces"
  - name: OTEL_EXPORTER_OTLP_TRACES_TIMEOUT
    value: "30000"
  - name: OTEL_SERVICE_NAME
    value: "easv3-child-dev"
  - name: OTEL_RESOURCE_ATTRIBUTES
    value: "service.namespace=eac,service.version=dev,deployment.environment=dev"
  - name: OTEL_PHP_AUTOLOAD_ENABLED
    value: "true"
  - name: OTEL_PHP_DISABLED_INSTRUMENTATIONS
    value: ""
  - name: OTEL_PROPAGATORS
    value: "tracecontext,baggage"
  - name: OTEL_TRACES_SAMPLER
    value: "parentbased_always_on"
  - name: OTEL_PHP_INTERNAL_METRICS_ENABLED
    value: "true"
  - name: OTEL_LOG_LEVEL
    value: "info"
  - name: PHP_INI_SCAN_DIR
    value: "/etc/opt/remi/php82/php.d:/var/www/html/config"

persistentVolume:
  web:
    enabled: true
    storageClassName: azurefile-csi-premium

akv:
  secretProviderClass: akv-child-dev

networkPolicy:
  enabled: true
  allowRulesEnabled: true

  allowFromNamespaces:
    - kube-system
    - istio-system
    - kgateway-system

  allowFromIpCidrs:
    - "10.0.40.0/24"
    - "10.0.33.0/24"

  allowDNS: true

  allowEgressCidrs:
    - { cidr: "10.0.34.64/26", port: 3306 }
    - { cidr: "0.0.0.0/0", port: 443 }
    - { cidr: "0.0.0.0/0", port: 80 }
    - { cidr: "10.0.34.128/26", port: 6379 }
    - { cidr: "10.0.34.128/26", port: 10000 }
    - { cidr: "10.0.34.128/26", port: 8500, endPort: 8599 }
    - { cidr: "10.0.0.0/16", port: 18000 }

# OpenTelemetry Collector for dev environment
otelCollector:
  enabled: true
  debug: true
  logLevel: debug
