image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

# Logical environment name for this release (e.g. dev, prod, training)
# Used with .Values.publicEnvironments to decide if the Gateway should be public.
environment: ""

replicaCount:
  web: 1

service:
  web:
    type: ClusterIP
    port: 80

persistentVolume:
  web:
    enabled: false
    size: 40Gi
    accessMode: ReadWriteMany
    storageClassName: ""  # set in env values if needed
    reclaimPolicy: Retain

gateway:
  enabled: true
  className: kgateway
  hosts: []     # to be overridden per environment
  tls:
    secretName: ""   # to be overridden per environment
  internal: true      # kept for reference; effective behavior is driven by environment/publicEnvironments
  options:
    http:
      connectionBufferLimits:
        maxRequestBytes: 65536
      normaliseRequestHeaders: true
      overrideHost:
        enabled: false

# Environments that are allowed to be PUBLIC (no ILB annotation).
# Anything NOT in this list will get an internal Load Balancer.
publicEnvironments:
  - prod
  - training
  - demo

imagePullSecrets:
  - name: "regcred"

networkPolicy:
  enabled: true
  allowRulesEnabled: true

  allowFromNamespaces:
    - kube-system
    - istio-system

  allowFromIpCidrs:
    - "10.0.40.0/24"
    - "10.0.33.0/24"

  allowDNS: true
  allowEgressCidrs:
    - { cidr: "10.0.34.64/26", port: 3306 }
    - { cidr: "0.0.0.0/0", port: 443 }
    - { cidr: "0.0.0.0/0", port: 80 }
    - { cidr: "10.0.34.128/26", port: 6379 }

akv:
  secretProviderClass: []

# OpenTelemetry Collector Configuration
otelCollector:
  enabled: true
  debug: false
  logLevel: info
  image:
    repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
    tag: "latest"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  dash0:
    endpoint: "https://ingress.us-west-2.aws.dash0.com"
    apiKey: "auth_0P2636J0nmZU13mHY8zuxxk2wf4VIr2x"