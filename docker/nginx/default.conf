upstream parent_web {
    server parent_web:80;
}

upstream child_web {
    server child_web:80;
}

upstream phpmyadmin {
    server phpmyadmin:80;
}

server {
    listen 80;

    server_name parent.earlyaccesscare.local;
    location / {
        proxy_pass http://parent_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    client_max_body_size 512m;
    client_body_timeout 1200s;
    server_name child.earlyaccesscare.local;
    location / {
        proxy_pass http://child_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    client_max_body_size 512m;
    client_body_timeout 1200s;

    server_name phpmyadmin.earlyaccesscare.local;
    location / {
        proxy_pass http://phpmyadmin;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_request_buffering off;
        proxy_buffering off;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        send_timeout 1200s;
    }
}
