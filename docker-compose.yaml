volumes:
  child_db_data:
  eacv2_db_data:
  parent_db_data:
  child_cache_data:
  parent_cache_data:
  easv3_code:
    external: true
  easv3parent_code:
    external: true

networks:
  eas_v3_network:
    driver: bridge

services:
  dev_coder:
    image: earlyaccesscare/easv3_coder:latest
    container_name: easv3_coder
    platform: linux/amd64
    ports:
      - "2222:22"
    volumes:
      - easv3_code:/workspace/child:rw
      - easv3parent_code:/workspace/parent:rw
      - ~/.ssh:/mnt/host_ssh/.ssh:ro
      - ./scripts/first-time-setup.sh:/workspace/first-time-setup.sh:ro
      - ./scripts/run-all-migrations.sh:/workspace/run-all-migrations.sh:ro
      - ./scripts/phpunit-results.sh:/workspace/phpunit-results.sh:ro
      - ${CHILD_ENV_FILE}:/workspace/env/child/.env.local.override:ro
      - ${PARENT_ENV_FILE}:/workspace/env/parent/.env.local.override:ro
      - ~/.gitconfig:/mnt/host_git/.gitconfig:ro
      - ../eacv3/.vscode:/home/dev/.vscode:rw 
    networks:
      - eas_v3_network
    command: >
      bash -c "
        echo '🔐 Fixing SSH permissions...' &&
        mkdir -p /home/dev/.ssh &&
        cp /mnt/host_ssh/.ssh/id_ed25519 /home/dev/.ssh/id_ed25519 2>/dev/null || true &&
        cp /mnt/host_ssh/.ssh/id_ed25519.pub /home/dev/.ssh/id_ed25519.pub 2>/dev/null || true &&
        cp /mnt/host_ssh/.ssh/known_hosts /home/dev/.ssh/known_hosts 2>/dev/null || true &&
        chmod 600 /home/dev/.ssh/id_ed25519 &&
        chmod 644 /home/dev/.ssh/id_ed25519.pub /home/dev/.ssh/known_hosts &&
        chown -R dev:dev /home/dev/.ssh &&
        echo '✅ SSH setup complete.' &&
        exec /usr/sbin/sshd -D
      "


  child_db:
    image: ${CHILD_DB_IMAGE}
    container_name: easv3_child_db
    platform: linux/amd64
    restart: always
    env_file:
      - ./env/child/.env.local.override
    volumes:
      - child_db_data:/var/lib/mysql
      - ./docker/initdb/child:/docker-entrypoint-initdb.d/
    ports:
      - "3306:3306"
    networks:
      - eas_v3_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: child_redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - eas_v3_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  eacv2_db:
    image: ${CHILD_DB_IMAGE}
    container_name: eacv2_db
    platform: linux/amd64
    restart: always
    env_file:
      - ./env/child/.env.local.override
    volumes:
      - eacv2_db_data:/var/lib/mysql
      - ./docker/initdb/eacv2_db:/docker-entrypoint-initdb.d/
    ports:
      - "3308:3306"
    networks:
      - eas_v3_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  child_web:
    build:
      context: ../eacv3
      dockerfile: docker/Dockerfile.web
      cache_from:
        - earlyaccesscare/easv3_child_web:latest
      target: ""
    image: earlyaccesscare/easv3_child_web:latest
    container_name: easv3_child_web
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      child_db:
        condition: service_healthy
    env_file:
      - ./env/child/.env.local.override
    environment:
      - TMPDIR=/var/www/html/var/tmp
      - RSYNC_ENABLED=1
      - PHP_SESSION_SAVE_HANDLER=redis
      - PHP_SESSION_SAVE_PATH=tcp://redis:6379
      - REDIS_URL=redis://redis:6379
      - REDIS_CLUSTER_ENABLED=0
      - REDIS_TLS_ENABLED=0
      - REDIS_TLS_VERIFY_PEER=0
      - REDIS_TLS_VERIFY_PEER_NAME=0
      
      # ---- OpenTelemetry / Dash0 Configuration ----
      - OTEL_SDK_DISABLED=false
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_TRACES_TIMEOUT=30000
      - OTEL_SERVICE_NAME=easv3-child
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=eac,service.version=dev
      - OTEL_PHP_AUTOLOAD_ENABLED=true
      - OTEL_PHP_INSTRUMENTATION_ENABLED=true
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_TRACES_SAMPLER=parentbased_always_on
      - OTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer auth_0P2636J0nmZU13mHY8zuxxk2wf4VIr2x
      - DASH0_DATASET=${DASH0_DATASET:-default}
      - APP_VERSION=dev
    volumes:
      - easv3_code:/mnt/easv3_code:ro
      - child_cache_data:/var/www/html/var
      - ${CHILD_ENV_FILE}:/var/www/html/.env.local.override
    networks:
      - eas_v3_network

  parent_db:
    image: ${PARENT_DB_IMAGE}
    container_name: easv3_parent_db
    platform: linux/amd64
    restart: always
    env_file:
      - ./env/parent/.env.local.override
    volumes:
      - parent_db_data:/var/lib/mysql
      - ./docker/initdb/parent:/docker-entrypoint-initdb.d/
    ports:
      - "3307:3306"
    networks:
      - eas_v3_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  parent_web:
    image: ${PARENT_IMAGE}
    container_name: easv3_parent_web
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      parent_db:
        condition: service_healthy
    env_file:
      - ./env/parent/.env.local.override
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
      - DB_SERVER_VERSION=8.0
      - DB_SSL_CA_PATH=/etc/ssl/certs/ca-certificates.crt
      - DB_SSL_VERIFY=0
    volumes:
      - easv3parent_code:/mnt/easv3parent_code:ro
    command: >
      bash -c '
        while sleep 2; do
          flock /tmp/rsync.lock rsync -a --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'vendor/' \
            --exclude 'var/' \
            --exclude 'session/' \
            --exclude 'public/uploads/' \
            --include '.env.local.override' \
            --exclude '.env*' \
            /mnt/easv3parent_code/ /var/www/html/
        done &

        until [ -f /var/www/html/public/index.php ]; do
          echo "Waiting for rsync to complete...";
          sleep 3;
        done

        echo "Starting PHP-FPM and Apache..."
        /opt/remi/php82/root/usr/sbin/php-fpm &
        exec /usr/sbin/httpd -D FOREGROUND
      '
    networks:
      - eas_v3_network
  phpmyadmin:
    image: earlyaccesscare/phpmyadmin
    container_name: phpmyadmin
    platform: linux/amd64
    restart: unless-stopped
    environment:
      PMA_HOSTS: child_db,parent_db,eacv2_db
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 512M
      MEMORY_LIMIT: 1024M
      MAX_EXECUTION_TIME: 1200
      MAXI_INPUT_TIME: 1200
    depends_on:
      child_db:
        condition: service_healthy
      parent_db:
        condition: service_healthy
      eacv2_db:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - eas_v3_network

  nginx:
    image: earlyaccesscare/easv3_nginx:latest
    container_name: easv3_nginx
    platform: linux/amd64
    depends_on:
      - child_web
      - parent_web
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - eas_v3_network

  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:latest
    container_name: easv3_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/collector.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
    environment:
      - DASH0_API_KEY=auth_0P2636J0nmZU13mHY8zuxxk2wf4VIr2x
    networks:
      - eas_v3_network
    restart: unless-stopped
