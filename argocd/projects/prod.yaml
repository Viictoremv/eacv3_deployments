apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod
  namespace: argocd
spec:
  description: Early Access System Prod Environment
  sourceRepos:
    - git@github.com:Early-Access-Care-LLC/easv3_deployments.git
  destinations:
    - namespace: parent-prod
      server: https://eaceas-q4zby22b.privatelink.eastus.azmk8s.io:443
    - namespace: child-prod
      server: https://eaceas-q4zby22b.privatelink.eastus.azmk8s.io:443
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
  syncWindows: []   # add “allow” windows later if you want time-based control
