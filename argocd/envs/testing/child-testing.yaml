apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: child-testing
  namespace: argocd
spec:
  project: testing
  source:
    repoURL: git@github.com:Early-Access-Care-LLC/easv3_deployments.git
    targetRevision: main
    path: apps/child/helm-chart
    helm:
      valueFiles:
        - values.testing.yaml   # <-- this file must live in the chart root
  destination:
    server: https://eaceas-d9ansove.privatelink.eastus.azmk8s.io:443
    namespace: child-testing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
