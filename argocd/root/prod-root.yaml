apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Early-Access-Care-LLC/easv3_deployments.git
    targetRevision: main
    path: argocd/envs
    directory:
      recurse: true
      include: "{demo,training,prod}/**/*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
