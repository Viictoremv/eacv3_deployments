apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Hide operator-generated report resources from the app tree so the UI stays
  # focused on Git-managed workloads.
  resource.exclusions: |
    - apiGroups:
        - aquasecurity.github.io
      kinds:
        - ConfigAuditReport
        - ExposedSecretReport
        - SbomReport
        - VulnerabilityReport
      clusters:
        - "*"
    - apiGroups:
        - secrets-store.csi.x-k8s.io
      kinds:
        - SecretProviderClassPodStatus
      clusters:
        - "*"
