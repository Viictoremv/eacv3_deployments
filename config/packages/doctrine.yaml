doctrine:
  dbal:
    connections:
      default:
        url: "%env(resolve:DATABASE_URL)%"
        server_version: "%env(resolve:DB_SERVER_VERSION)%"
        charset: utf8mb4
        mapping_types:
          enum: string
        options:
          "1009": "%env(string:default::DB_SSL_CA_PATH)%"
          "1014": "%env(bool:default::DB_SSL_VERIFY)%"
      transition:
        url: "%env(resolve:TRANSITION_DATABASE_READWRITE)%"
        options:
          !php/const PDO::MYSQL_ATTR_SSL_CA: "/etc/pki/tls/certs/ca-bundle.crt"
        server_version: "%env(resolve:DB_SERVER_VERSION)%"
        mapping_types:
          enum: string
      transition_readonly:
        url: "%env(resolve:TRANSITION_DATABASE_READONLY)%"
        options:
          !php/const PDO::MYSQL_ATTR_SSL_CA: "/etc/pki/tls/certs/ca-bundle.crt"
        server_version: "%env(resolve:DB_SERVER_VERSION)%"
        mapping_types:
          enum: string
      v2:
        url: "%env(resolve:V2_DATABASE_URL)%"
        server_version: "%env(resolve:DB_SERVER_VERSION)%"
        mapping_types:
          enum: string
    default_connection: default

  orm:
    auto_generate_proxy_classes: true
    enable_lazy_ghost_objects: true
    controller_resolver:
      auto_mapping: true
    entity_managers:
      default:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        default_repository_class: App\Repository\BaseRepository
        filters:
          softdeleteable:
            class: Gedmo\SoftDeleteable\Filter\SoftDeleteableFilter
            enabled: true
        auto_mapping: true
        mappings:
          App:
            is_bundle: false
            type: attribute
            dir: "%kernel.project_dir%/src/Entity"
            prefix: 'App\Entity'
            alias: App
        metadata_cache_driver:
          type: pool
          pool: doctrine.second_level_cache_pool
        query_cache_driver:
          type: pool
          pool: doctrine.second_level_cache_pool
        result_cache_driver:
          type: pool
          pool: doctrine.second_level_cache_pool
        second_level_cache:
          enabled: true
          regions:
            append_only:
              lifetime: 10800
              cache_driver:
                type: pool
                pool: doctrine.second_level_cache_pool
              type: filelock
              lock_path: "/tmp/doctrine/filelock/append_only"
            read_write:
              lifetime: 10800
              cache_driver:
                type: pool
                pool: doctrine.second_level_cache_pool
              type: filelock
              lock_path: "/tmp/doctrine/filelock/read_write"

      # transition:
      #     connection: transition
