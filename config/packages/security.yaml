security:
    role_hierarchy:
        ROLE_USER: [IS_AUTHENTICATED_FULLY, ROLE_ALLOWED_TO_SWITCH]
        ROLE_PHYSICIAN: ROLE_USER
        ROLE_ADMIN: [ROLE_APPROVER, ROLE_ALLOWED_TO_SWITCH]
    # encoders:
    #     App\Entity\User:
    #         algorithm: auto

    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    # https://symfony.com/doc/current/security.html#where-do-users-come-from-user-providers

    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            user_checker: App\Security\UserChecker
            security: false
            two_factor:
                auth_form_path: 2fa_login # The route name you have used in the routes.yaml
                check_path: 2fa_login_check
                multi_factor: false
        main:
            #anonymous: true
            user_checker: App\Security\UserChecker
            entry_point: form_login
            lazy: true
            switch_user: true
            provider: app_user_provider
            form_login:
                login_path: login
                check_path: login
                default_target_path: home
            access_denied_handler: App\Security\AccessDeniedHandler
            # guard:
            #     authenticators:
            #         - App\Security\LoginFormAuthenticator
            logout:
                path: app_logout
                # where to redirect after logout
                # target: app_any_route
            two_factor:
                auth_form_path: 2fa_login # The route name you have used in the routes.yaml
                check_path: 2fa_login_check
                multi_factor: false

            # configure the maximum login attempts
            login_throttling:
                max_attempts: 5 # per minute ...
                interval: "15 minutes" # ... or in a custom period

            # use a custom rate limiter via its service ID
            #login_throttling:
            #limiter: app.my_login_rate_limiter

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#firewalls-authentication

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    # access_control:
    #     - { path: ^/logout, role: PUBLIC_ACCESS }
    #     - { path: ^/2fa, role: IS_AUTHENTICATED_2FA_IN_PROGRESS }
    #     - { path: ^/reset-password, roles: IS_AUTHENTICATED_ANONYMOUSLY }
    #     - { path: ^/check-email, roles: IS_AUTHENTICATED_ANONYMOUSLY }
    #     - { path: ^/login, roles: IS_AUTHENTICATED_ANONYMOUSLY }
    #     - { path: ^/series, roles: IS_AUTHENTICATED_ANONYMOUSLY }
    #     - { path: ^/, roles: IS_AUTHENTICATED_ANONYMOUSLY }
    #     - { path: ^/home, roles: IS_AUTHENTICATED_FULLY }
    #     - { path: ^/, roles: PUBLIC_ACCESS }
    #     - { path: ^/admin, roles: ROLE_ADMIN }
    #     - { path: ^/profile, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
