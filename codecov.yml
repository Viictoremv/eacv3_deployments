coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 2%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  show_carryforward_flags: true

flags:
  unittests:
    paths:
      - src/
      - assets/
    carryforward: true
  e2e:
    paths:
      - tests/e2e/
    carryforward: true

ignore:
  - "migrations/"
  - "tests/"
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/*.test.js"
  - "**/*.spec.js"
  - "vendor/"
  - "node_modules/"
